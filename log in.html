*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    background:linear-gradient(135deg,white);
    min-height:100vh;
}

/* HEADER */
header{
    background:rgb(5, 203, 238);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:45px;
    text-align:center;
    flex:1;
}
.header-title{
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

/* NAVIGATION */
nav{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:10px 15px;
    border-radius:6px;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:#003366;
}

/* LOGIN CONTAINER */
.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

/* LOGIN BOX */
.login-box{
    width:350px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 16px 40px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 1s ease;
}

.login-box h2{
    margin-bottom:25px;
    color:#333;
}

/* INPUTS */
.input-box{
    margin-bottom:20px;
    text-align:left;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#555;
}
h3{
    color:#003366;
}
.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:16px;
    transition:0.3s;
}

.input-box input:focus{
    border-color:white;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

/* BUTTON */
button{
    width:100px;
    padding:10px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:5px;
    border-radius:5px;
}


button:hover{
    background:#008cdd;
    transform:scale(1.03);
}
 

/* FOOTER */
footer{
    background:rgb(5, 203, 238);
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

/* SOCIAL ICONS */
.icon{
    display:inline-block;
    width:50px;
    height:50px;
    line-height:50px;
    margin:10px;
    text-align:center;
    border-radius:50%;
    color:white;
    font-size:22px;
    transition:0.3s;
}

.fb{
    background:#1877f2;
}

.yt{
    background:#ff0000;
}

.tt{
    background:#000000;
}

.ig{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.icon:hover{
    transform:scale(1.2);
    opacity:0.8;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width:700px){

    header{
        flex-direction:column;
        text-align:center;
    }

    header h1{
        font-size:28px;
        margin:15px 0;
    }

    nav a{
        display:block;
        margin:10px 0;
    }

    .login-box{
        width:100%;
        max-width:350px;
    }
}
.dark-mode {
    background:black;
    color:white;
}

.dark-mode a {
    color:lightblue;
}
</style>
