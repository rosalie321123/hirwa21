<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    background:linear-gradient(135deg,white);
    min-height:100vh;
}

/* HEADER */
header{
    background:rgb(5, 203, 238);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:45px;
    text-align:center;
    flex:1;
}
.header-title{
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

/* NAVIGATION */


nav{
display:flex;
justify-content:center;
background:#0055aa;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
flex-wrap:wrap;
}

nav a{
padding:15px 20px;
text-decoration:none;
color:white;
font-weight:bold;
position:relative;
}

nav a:hover{
color: chartreuse;
}

nav a.active::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:3px;
background:#0073e6;
border-radius:2px;
}

/* LOGIN CONTAINER */
.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

/* LOGIN BOX */
.login-box{
    width:350px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 16px 40px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 1s ease;
}

.login-box h2{
    margin-bottom:25px;
    color:#333;
}

/* INPUTS */
.input-box{
    margin-bottom:20px;
    text-align:left;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#555;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:16px;
    transition:0.3s;
}

.input-box input:focus{
    border-color:white;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#008cdd;
    transform:scale(1.03);
}

/* FOOTER */
footer{
    background:rgb(5, 203, 238);
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

/* SOCIAL ICONS */
.icon{
    display:inline-block;
    width:50px;
    height:50px;
    line-height:50px;
    margin:10px;
    text-align:center;
    border-radius:50%;
    color:white;
    font-size:22px;
    transition:0.3s;
}

.fb{
    background:#1877f2;
}

.yt{
    background:#ff0000;
}

.tt{
    background:#000000;
}

.ig{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}

.icon:hover{
    transform:scale(1.2);
    opacity:0.8;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width:700px){

    header{
        flex-direction:column;
        text-align:center;
    }

    header h1{
        font-size:28px;
        margin:15px 0;
    }

    nav a{
        display:block;
        margin:10px 0;
    }

    .login-box{
        width:100%;
        max-width:350px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<a href="image.html">
    <img src="2.png" alt="Logo" height="100">
</a>

<div style="text-align: center;font-size:50px"><b>WELCOME TO GS REMERA TSS</b></div>

<img src="3.png" alt="Logo" height="100">

</header>


<nav>


    <a href="Home.html">Home</a>
    <a href="department.html">Department</a>
    <a href="stakeholder.html">Stakeholders</a>
    <a href="log in2.html">Accounting</a>
    <a href="log in.html">Marks Portal</a>
    <a href="event.html">Events & Publication</a>
    <a href="contact.html">Contact</a>

</nav>

<!-- LOGIN FORM -->
<div class="login-container">

<div class="login-box">

    <h2>Login Form</h2>

    <form id="loginForm">

        <div class="input-box">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

    </form>

</div>

</div>

<!-- JAVASCRIPT -->
<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){

        alert("Please fill all fields!");

    }else{

        alert("Login Successful!");

        window.location.href = "marks portal.html";
    }

});

</script>

<!-- FOOTER -->
<footer>

<div class="social-icons">

  <a href="https://www.facebook.com" class="icon fb">
    <i class="fab fa-facebook-f"></i>
  </a>

  <a href="https://www.youtube.com" class="icon yt">
    <i class="fab fa-youtube"></i>
  </a>

  <a href="https://www.tiktok.com" class="icon tt">
    <i class="fab fa-tiktok"></i>
  </a>

  <a href="https://www.instagram.com" class="icon ig">
    <i class="fab fa-instagram"></i>
  </a>

</div>

</footer>


</body>
</html>
